name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore KotobaColiseum.slnx

      - name: Build
        run: dotnet build KotobaColiseum.slnx --no-restore

      - name: Battle Service Tests
        run: dotnet test tests/KotobaColiseum.E2E/KotobaColiseum.E2E.csproj --no-build --filter BattleServiceTests
