name: kotoba-coliseum

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      KOTOBA_COLISEUM_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      KOTOBA_COLISEUM_APPDATA_ROOT: /shared/app-data
    ports:
      - "${KOTOBA_COLISEUM_WEB_PORT:-19120}:8080"
    volumes:
      - app-data:/shared/app-data

volumes:
  app-data:
